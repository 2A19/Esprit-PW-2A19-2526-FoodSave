<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodSave - Donner mon avis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../../../public/assets/css/style.css">
    
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .form-card-avis {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid #e8e0c8;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e8e0c8;
            border-radius: 14px;
            font-family: "Poppins", sans-serif;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #4caf50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }
        
        .rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .rating input {
            display: none;
        }
        
        .rating label {
            font-size: 2rem;
            color: #ddd;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .rating input:checked ~ label,
        .rating label:hover,
        .rating label:hover ~ label {
            color: #ffc107;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }
        
        .article-info {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1), rgba(255, 107, 53, 0.05));
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <div class="nav-logo">
                <img src="../../../../public/assets/images/logo_foodsave.png" alt="Logo" style="height: 50px; width: auto;">
                <span style="font-weight: 700; font-size: 1.4rem;">
                    <span style="color: #ff6b35;">Food</span><span style="color: #4caf50;">Save</span>
                </span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Accueil</a>
                <a href="blog.html" class="nav-link">Blog</a>
                <a href="conseils.html" class="nav-link">Conseils</a>
                <a href="recettes.html" class="nav-link">Recettes</a>
            </div>
            <div class="user-actions">
                <button class="login-btn login-outline">Connexion</button>
                <button class="login-btn login-primary">Inscription</button>
            </div>
        </div>
    </nav>

    <div class="form-container">
        <div class="form-card-avis">
            <h1 style="color: #333; margin-bottom: 1rem;"><i class="fas fa-star" style="color: #ffc107;"></i> Donner mon avis</h1>
            
            <div class="article-info">
                <strong>Article :</strong> 10 astuces pour bien conserver ses légumes
            </div>
            
            <form>
                <div class="form-group">
                    <label>Votre note</label>
                    <div class="rating">
                        <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
                        <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
                        <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
                        <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
                        <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Votre avis</label>
                    <textarea rows="5" placeholder="Partagez votre expérience..."></textarea>
                </div>
                
                <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> Publier mon avis</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-grid">
            <div class="footer-brand">
                <span>🍽️ FoodSave</span>
                <p>Stop au gaspillage alimentaire</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2025 FoodSave - Tous droits réservés</p>
        </div>
    </footer>

</body>
</html>
