<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond circulaire -->
  <circle cx="100" cy="100" r="95" fill="#F8F9FA" stroke="#E8EAED" stroke-width="2"/>
  
  <!-- Feuille (Écologie) - Haut gauche -->
  <path d="M 70 60 Q 60 70 65 85 Q 75 90 80 75 Q 78 68 70 60" fill="#4CAF50" opacity="0.9"/>
  <path d="M 65 70 Q 68 75 70 80" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
  
  <!-- Fourchette (Nourriture) - Centre -->
  <g transform="translate(100, 85)">
    <!-- Manche -->
    <rect x="-3" y="5" width="6" height="30" fill="#4CAF50" rx="3"/>
    <!-- Dents -->
    <rect x="-12" y="-15" width="4" height="20" fill="#4CAF50" rx="2"/>
    <rect x="-4" y="-15" width="4" height="20" fill="#4CAF50" rx="2"/>
    <rect x="4" y="-15" width="4" height="20" fill="#4CAF50" rx="2"/>
    <rect x="12" y="-15" width="4" height="20" fill="#4CAF50" rx="2"/>
  </g>
  
  <!-- Carotte (Énergie) - Bas droite -->
  <g transform="translate(130, 120)">
    <!-- Carotte orange -->
    <path d="M -8 0 L 8 0 L 5 20 L -5 20 Z" fill="#FFA726"/>
    <!-- Feuilles vertes -->
    <path d="M -5 0 Q -8 -5 -6 -12" stroke="#4CAF50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 0 0 Q -2 -7 0 -14" stroke="#4CAF50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 5 0 Q 8 -5 6 -12" stroke="#4CAF50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Ondulation vague - Bas -->
  <path d="M 40 150 Q 60 145 80 150 T 120 150 T 160 150" stroke="#FFA726" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
