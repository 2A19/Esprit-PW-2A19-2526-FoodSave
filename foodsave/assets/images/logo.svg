<!-- FoodSave Logo - Professional Design -->
<!-- High-quality SVG logo with gradients and modern styling -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Green Gradients -->
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388E3C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:1" />
    </linearGradient>
    
    <!-- Orange Gradient -->
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB74D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA726;stop-opacity:1" />
    </linearGradient>
    
    <!-- Yellow-Green for curves -->
    <linearGradient id="yellowGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4E157;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9CCC65;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ======================== ICON PART ======================== -->
  
  <!-- Carrot (Orange) -->
  <ellipse cx="40" cy="70" rx="20" ry="28" fill="url(#orangeGradient)" opacity="0.95" />
  <path d="M 38 42 Q 35 30 32 20 Q 30 15 35 12 Q 40 10 42 20 Q 45 30 48 42" fill="#FFA726" opacity="0.8" />
  
  <!-- Decorative curve (Yellow-Green) -->
  <path d="M 15 60 Q 20 50 35 45 Q 30 55 20 70 Q 15 65 15 60" fill="url(#yellowGreen)" opacity="0.7" />
  <path d="M 12 80 Q 18 75 28 75 Q 22 85 12 90" fill="url(#yellowGreen)" opacity="0.6" />
  
  <!-- Fork (Green) -->
  <g id="fork" transform="translate(50, 55)">
    <!-- Handle -->
    <rect x="0" y="18" width="5" height="25" fill="#4CAF50" rx="2.5" />
    <!-- Prongs -->
    <rect x="-8" y="0" width="3" height="18" fill="#66BB6A" rx="1.5" />
    <rect x="-1" y="-2" width="3" height="20" fill="#4CAF50" rx="1.5" />
    <rect x="6" y="0" width="3" height="18" fill="#66BB6A" rx="1.5" />
  </g>
  
  <!-- Top Left Leaf (Green) -->
  <path d="M 20 15 Q 15 5 10 0 Q 12 8 15 20 Q 18 18 20 15" fill="url(#greenGradient)" opacity="0.9" />
  
  <!-- Top Right Leaf (Light Green) -->
  <path d="M 65 20 Q 72 5 78 0 Q 75 10 68 25 Q 66 23 65 20" fill="url(#greenLight)" opacity="0.85" />
  
  <!-- Small accent leaf (right side) -->
  <path d="M 75 85 Q 82 92 88 98 Q 85 94 80 88 Q 77 87 75 85" fill="#81C784" opacity="0.7" />
  
  <!-- ======================== TEXT PART ======================== -->
  
  <!-- "Food" in Green -->
  <text x="110" y="65" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#4CAF50" letter-spacing="-1">Food</text>
  
  <!-- "Savé" in Orange -->
  <text x="220" y="65" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#FFA726" letter-spacing="-1">Savé</text>
  
  <!-- Optional: Decorative underline -->
  <line x1="110" y1="75" x2="290" y2="75" stroke="#E0E0E0" stroke-width="1" opacity="0.5" />
</svg>

<!-- 
  ====================
  INTEGRATION GUIDE
  ====================
  
  Usage in HTML:
  1. For header logo:
     <img src="assets/images/logo.svg" alt="FoodSave Logo" class="logo-image" width="50" height="50" />
  
  2. For favicon:
     <link rel="icon" href="assets/images/logo.svg" type="image/svg+xml">
  
  3. CSS styling (optional):
     .logo-image {
       width: 50px;
       height: 50px;
       object-fit: contain;
     }
-->
  
  3. Ou intégrer directement dans le header:
     <div class="logo-icon">
       <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="40" height="40">
         [contenu SVG]
       </svg>
     </div>
-->
